<!-- ./templates/components/common/module_card.html -->
<div class="module-card">
    <h3>{{ module.module_name }}</h3>
    <p>{{ module.module_desc }}</p>

    <div class="module-footer">
        <div class="card-controls">
            <span class="status-indicator"></span>
            <span class="status-text" style="font-size: 0.75rem; color: var(--text-muted);">Standby</span>
        </div>
        <a href="{{ module.module_link }}" class="module-btn">Open Module</a>
    </div>
</div>
