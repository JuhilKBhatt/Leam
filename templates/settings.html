<!-- ./templates/settings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings – LEAM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/toggle_switch.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    {% include "components/common/header.html" %}

    <main class="container">
        <div class="header-section">
            <h2>Global Settings</h2>
            <p>Configure system-wide parameters and monitoring.</p>
        </div>
        
        <section class="panel">
            <div class="settings-group">
                <label for="timezone-select">Application Timezone</label>
                <select id="timezone-select" class="settings-input">
                    <option value="UTC">UTC (Universal Coordinated Time)</option>
                    <option value="America/New_York">Eastern Time (US & Canada)</option>
                    <option value="America/Chicago">Central Time (US & Canada)</option>
                    <option value="America/Denver">Mountain Time (US & Canada)</option>
                    <option value="America/Los_Angeles">Pacific Time (US & Canada)</option>
                    <option value="Europe/London">London</option>
                    <option value="Europe/Paris">Paris / Berlin / Rome</option>
                    <option value="Asia/Tokyo">Tokyo</option>
                    <option value="Asia/Kolkata">India (IST)</option>
                    <option value="Australia/Sydney">Sydney</option>
                </select>
                <p class="setting-hint">This affects module scheduling and log timestamps.</p>
            </div>
            
            <div class="settings-actions">
                <button id="save-global-settings" class="btn btn-primary">Save Settings</button>
            </div>
        </section>
    </main>

    {% include "components/common/footer.html" %}

    <!-- JS -->
    <script src="{{ url_for('static', filename='scripts/system_monitor_socket.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/settings_page.js') }}"></script>

</body>
</html>
