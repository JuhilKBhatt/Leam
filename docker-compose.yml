services:
  leam:
    build: .
    ports:
      - "5000:5000"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./modules:/app/modules
      - ./bg_videos:/app/bg_videos
      - ./secrets:/app/secrets
      - ./static:/app/static
      - ./templates:/app/templates
    env_file:
      - .env
    restart: always
    shm_size: '2gb'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G